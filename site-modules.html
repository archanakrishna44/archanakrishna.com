<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site modules — shared templates</title>
</head>
<body>
<!--
  Shared HTML module templates for the portfolio site.
  Use with Lodash _.template() or similar: load this file or fetch these
  script contents, compile with your data (e.g. activeNav), then inject
  into each page. IDs are used to look up each template.

  
-->

<!-- NAV: pass { activeNav: 'home'|'work'|'about'|null } to mark the active link -->
<script type="text/x-lodash-template" id="nav-template">
<div class="nav-wrapper">
  <div class="container">
  <div class="row">
  <nav class="nav col-12 px-4">
    <div class="nav-left nav-left-responsive ">
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
        <i class="bi bi-list" aria-hidden="true"></i>
      </button>
      <div class="inner">
        <a href="index.html" class="nav-link <%= activeNav === 'home' ? 'active' : '' %>" data-nav="home">Home</a>
        <a href="index.html#selected-work" class="nav-link <%= activeNav === 'work' ? 'active' : '' %>" data-nav="work">Work</a>
        <a href="about.html" class="nav-link <%= activeNav === 'about' ? 'active' : '' %>" data-nav="about">About</a>
        <a href="resume.html" class="nav-link <%= activeNav === 'resume' ? 'active' : '' %>" data-nav="resume">Resume</a>
      </div>
    </div>
    <a href="index.html" class="nav-center" style="cursor:pointer; text-decoration:none;">ARCHANA KRISHNA</a>
    <div class="nav-right">
      <a href="https://www.linkedin.com/in/archkrishna/" target="_blank" aria-label="LinkedIn">
        <svg class="linkedin-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>
  </nav>
</div>
</div>
</div>
</script>

<!-- NAV CASE STUDY: back button only (used on dus360, homepath, forecasting) -->
<script type="text/x-lodash-template" id="nav-case-study-template">
  <div class="nav-wrapper">
    <div class="container">
    <div class="row">
  <nav class="nav">
    <a href="<%= basePath || '' %>index.html#selected-work" class="btn btn-secondary"><i class="bi bi-arrow-left" aria-hidden="true"></i> Back</a>
    <a href="<%= basePath || '' %>index.html" class="nav-center" style="cursor:pointer; text-decoration:none;">ARCHANA KRISHNA</a>
    <div class="nav-right"></div>
  </nav>
</div>
</div>
</div>
</script>

<!-- FOOTER: same on every page -->
<script type="text/x-lodash-template" id="footer-template">
<footer class="footer">
  <div class="container">
    <div class="row">
      <div class="col-12">
  <div class="footer-left">
    <div class="footer-name">Archana Krishna</div>
    <div class="footer-copyright">All Rights Reserved &copy; Archana Krishna</div>
  </div>
  <div class="footer-right">
    <div class="footer-links">
      <a href="<%= basePath || '' %>index.html" class="footer-link">Home</a>
      <span class="footer-dot">&middot;</span>
      <a href="<%= basePath || '' %>index.html#selected-work" class="footer-link">Work</a>
      <span class="footer-dot">&middot;</span>
      <a href="<%= basePath || '' %>about.html" class="footer-link">About</a>
      <span class="footer-dot">&middot;</span>
      <a href="<%= basePath || '' %>resume.html" class="footer-link">Resume</a>
    </div>
    <div class="footer-contact">
      <span style="font-size: 14px; color: rgba(255,255,255,0.7);">archanakrishna44@gmail.com</span>
      <a href="https://www.linkedin.com/in/archkrishna/" target="_blank">LinkedIn</a>
    </div>
  </div>
</div>
</div>
</div>
</footer>
</script>

</body>
</html>
